services:
  ingest:
    profiles:
      - jobs
    build:
      context: .
      dockerfile: dockerfiles/ingest.Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      - kafka

  preprocess:
    profiles:
      - jobs
    build:
      context: .
      dockerfile: dockerfiles/preprocess.Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      PROCESSED_DIR: /workspace/processed
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
    depends_on:
      - kafka

  train:
    profiles:
      - jobs
    build:
      context: .
      dockerfile: dockerfiles/train.Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      PROCESSED_DIR: /workspace/processed
      MODELS_DIR: /workspace/models
      DATABASE_URL: postgresql+psycopg2://cloudml:cloudml@postgres:5432/cloudml
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
    depends_on:
      - kafka
      - postgres

  preprocess_consumer:
    build:
      context: .
      dockerfile: dockerfiles/preprocess_consumer.Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      PROCESSED_DIR: /workspace/processed
      SQS_QUEUE_DATASET_UPLOADED: ${SQS_QUEUE_DATASET_UPLOADED:-cloudml-dataset-uploaded}
      SQS_QUEUE_PREPROCESSING_DONE: ${SQS_QUEUE_PREPROCESSING_DONE:-cloudml-preprocessing-done}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
    restart: unless-stopped

  ingest_consumer:
    build:
      context: .
      dockerfile: dockerfiles/ingest_consumer.Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      SQS_QUEUE_CSV_UPLOAD_REQUESTED: ${SQS_QUEUE_CSV_UPLOAD_REQUESTED:-cloudml-csv-upload-requested}
      SQS_QUEUE_DATASET_UPLOADED: ${SQS_QUEUE_DATASET_UPLOADED:-cloudml-dataset-uploaded}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    restart: unless-stopped

  train_consumer:
    build:
      context: .
      dockerfile: dockerfiles/train_consumer.Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      PROCESSED_DIR: /workspace/processed
      MODELS_DIR: /workspace/models
      DATABASE_URL: postgresql+psycopg2://cloudml:cloudml@postgres:5432/cloudml
      SQS_QUEUE_PREPROCESSING_DONE: ${SQS_QUEUE_PREPROCESSING_DONE:-cloudml-preprocessing-done}
      SQS_QUEUE_TRAINING_COMPLETE: ${SQS_QUEUE_TRAINING_COMPLETE:-cloudml-training-complete}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
    depends_on:
      - postgres
    restart: unless-stopped

  predict_consumer:
    build:
      context: .
      dockerfile: dockerfiles/predict_consumer.Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      MODELS_DIR: /workspace/models
      SQS_QUEUE_PREDICT_REQUESTED: ${SQS_QUEUE_PREDICT_REQUESTED:-cloudml-predict-requested}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: cloudml-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cloudml
      POSTGRES_USER: cloudml
      POSTGRES_PASSWORD: cloudml
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cloudml" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
